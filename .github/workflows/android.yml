name: Play Store AAB Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Gradle Wrapper
      run: gradle wrapper

    - name: Generate Production Keystore
      run: keytool -genkey -v -keystore release.keystore -storepass Sadhana2026 -alias sadhanakey -keypass Sadhana2026 -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Md. Monjurul Haque, OU=MH Academy, O=MH Academy, L=Kishoreganj, S=Dhaka, C=BD"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release AAB for Play Store
      run: ./gradlew bundleRelease -x lint -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore -Pandroid.injected.signing.store.password=Sadhana2026 -Pandroid.injected.signing.key.alias=sadhanakey -Pandroid.injected.signing.key.password=Sadhana2026

    - name: Upload Play Store AAB
      uses: actions/upload-artifact@v4
      with:
        name: PlayStore-Release-AAB
        path: app/build/outputs/bundle/release/app-release.aab

    - name: Upload Keystore Backup (KEEP SAFE)
      uses: actions/upload-artifact@v4
      with:
        name: Important-Keystore-Backup
        path: release.keystore
